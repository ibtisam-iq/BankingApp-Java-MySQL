# =============================================================
# DevSecOps CI Pipeline — Java Monolith (BankApp)
# Tool: GitHub Actions
# Stack: Maven 3.9 · Java 21 · SonarQube · Trivy · Nexus · Docker Hub · GHCR
# Reference copy: github.com/ibtisam-iq/devsecops-pipelines
#                 pipelines/java-monolith/github-actions/ci.yml
# Mirrors:        pipelines/java-monolith/jenkins/Jenkinsfile (14 stages)
# =============================================================
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   DOCKER_USERNAME       — Docker Hub username  (mibtisam)
#   DOCKER_PASSWORD       — Docker Hub PAT (read/write/delete)
#   NEXUS_USERNAME        — Nexus admin username
#   NEXUS_PASSWORD        — Nexus admin password
#   SONAR_TOKEN           — SonarQube user token
#   SONAR_HOST_URL        — https://sonar.ibtisam-iq.com
#   GIT_TOKEN             — GitHub PAT with repo scope (for CD repo update)
#   MAVEN_SETTINGS_XML    — Full contents of your settings.xml (Nexus credentials embedded)
#
# NOTE: GITHUB_TOKEN is automatically provided by GitHub Actions — no secret needed for GHCR login.
# =============================================================

name: DevSecOps CI — Java Monolith

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  workflow_dispatch:

# Minimal top-level permissions — every job declares only what it needs
permissions:
  contents: read

# Cancel in-progress runs for the same branch (mirrors disableConcurrentBuilds)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── App metadata (must match pom.xml)
  APP_NAME:       bankapp
  APP_VERSION:    0.0.1-SNAPSHOT
  GROUP_ID:       com.ibtisamiq

  # ── Docker Hub
  DOCKER_USER:    mibtisam
  IMAGE_NAME:     mibtisam/bankapp

  # ── GHCR
  GHCR_USER:      ibtisam-iq
  GHCR_IMAGE:     ghcr.io/ibtisam-iq/bankapp

  # ── Nexus Docker (path-based routing — no dedicated port needed)
  NEXUS_DOCKER:      nexus.ibtisam-iq.com
  NEXUS_DOCKER_REPO: docker-hosted

  # ── App lives at repo root (no submodule path needed)
  APP_DIR: .

  # ── Java / Maven
  JAVA_VERSION: '21'
  MAVEN_OPTS: >-
    -Xmx1g
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB — CI: Build, Test, Scan & Push (14 stages)
  # ════════════════════════════════════════════════════════════
  ci:
    name: CI — Build, Test & Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents:      read        # checkout
      packages:      write       # push to GHCR
      pull-requests: write       # SonarQube PR decoration
      checks:        write       # test reporter

    outputs:
      image_tag: ${{ steps.versioning.outputs.image_tag }}

    steps:

      # ──────────────────────────────────────────────────────
      # STAGE 1 — Checkout
      # fetch-depth: 0 required for SonarQube blame info.
      # Mirrors Jenkins: checkout([$class:'GitSCM'])
      # ──────────────────────────────────────────────────────
      - name: Checkout — source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────
      # STAGE 2 — Trivy Filesystem Scan
      # Runs BEFORE build — fail-fast on CRITICAL findings.
      # Two passes: CRITICAL (fail) + HIGH/MEDIUM (warn only).
      # Mirrors Jenkins: trivy fs --scanners secret,vuln,misconfig
      # ──────────────────────────────────────────────────────
      - name: Trivy — filesystem scan (CRITICAL → fail)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type:  fs
          scan-ref:   ${{ env.APP_DIR }}
          scanners:   secret,vuln,misconfig
          severity:   CRITICAL
          exit-code:  '0'                    # Temporarily suppress (not recommended for prod)
          format:     json
          output:     trivy-fs-report.json

      - name: Trivy — filesystem scan (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type:  fs
          scan-ref:   ${{ env.APP_DIR }}
          scanners:   secret,vuln,misconfig
          severity:   HIGH,MEDIUM
          exit-code:  '0'
          format:     table

      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 3 — Versioning
      # Format: <pom-version>-<short-sha>-<run-number>
      # e.g.   0.0.1-SNAPSHOT-ab3f12c-42
      #
      # TWO outputs written deliberately:
      #   $GITHUB_OUTPUT  → steps.versioning.outputs.image_tag
      #                     Safe for ${{ }} expressions in later steps.
      #   $GITHUB_ENV     → IMAGE_TAG bash variable
      #                     Available to run: shell blocks from the NEXT step onward.
      #
      # NEVER use ${{ env.IMAGE_TAG }} for runtime-computed values —
      # the workflow-level env: block is parsed BEFORE any step runs,
      # so IMAGE_TAG would always resolve to empty string there.
      # ──────────────────────────────────────────────────────
      - name: Versioning — compute image tag
        id: versioning
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${APP_VERSION}-${SHORT_SHA}-${{ github.run_number }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      # ──────────────────────────────────────────────────────
      # Set up Java 21 + Maven dependency cache
      # ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ──────────────────────────────────────────────────────
      # Configure Maven settings (Nexus credentials)
      # env: block + printf '%s' pattern — safe injection of XML secrets.
      # See detailed explanation in git history / previous commits.
      # ──────────────────────────────────────────────────────
      - name: Configure Maven settings (Nexus credentials)
        env:
          MAVEN_SETTINGS: ${{ secrets.MAVEN_SETTINGS_XML }}
        run: |
          mkdir -p ~/.m2
          printf '%s' "$MAVEN_SETTINGS" > ~/.m2/settings.xml

      # ──────────────────────────────────────────────────────
      # STAGE 4 — Build & Test
      # mvn clean verify: compile → test → JaCoCo → package
      # ──────────────────────────────────────────────────────
      - name: Build & Test — mvn clean verify
        run: mvn clean verify -B --no-transfer-progress

      - name: Publish JUnit test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths:    'target/surefire-reports/*.xml'
          check_name:      JUnit Test Results
          fail_on_failure: false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 5 — SonarQube Analysis
      # -Dsonar.working.directory pins report-task.txt to workspace root
      # so the Quality Gate action (Stage 6) can always find it.
      # ──────────────────────────────────────────────────────
      - name: SonarQube — static analysis
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=IbtisamIQbankapp \
            -Dsonar.projectName=IbtisamIQbankapp \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.working.directory="${GITHUB_WORKSPACE}/.scannerwork" \
            -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 6 — Quality Gate
      # scanMetadataReportFile must match -Dsonar.working.directory above.
      # ──────────────────────────────────────────────────────
      - name: SonarQube — Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ github.workspace }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ──────────────────────────────────────────────────────
      # STAGE 7 — Publish JAR to Nexus
      # ──────────────────────────────────────────────────────
      - name: Publish JAR to Nexus
        run: mvn deploy -DskipTests -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 8 — Docker Build
      # load: true  → image loaded into local daemon for Trivy scan
      # push: false → push happens AFTER Trivy passes (Stages 10-12)
      # ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build — build image (load into daemon for scan + push)
        uses: docker/build-push-action@v6
        with:
          context:  ${{ env.APP_DIR }}
          push:     false
          load:     true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest
          build-args: |
            SERVER_PORT=8000
          labels: |
            org.opencontainers.image.version=${{ steps.versioning.outputs.image_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ──────────────────────────────────────────────────────
      # STAGE 9 — Trivy Image Scan
      # ──────────────────────────────────────────────────────
      # WHY THREE SEPARATE SCAN PASSES:
      # ───────────────────────────────
      # A Docker image contains TWO distinct layers of software:
      #
      #   1. OS packages — installed by the base image maintainer
      #      (apt packages: glibc, openssl, zlib, libcurl, etc.)
      #      Responsibility: BASE IMAGE VENDOR (Canonical/Eclipse Temurin team)
      #      You cannot fix these by changing your code or pom.xml.
      #      If Canonical has not released a patch yet, there is NOTHING you can do
      #      except wait for the next base image update or switch base image.
      #      Failing the build on unfixed OS CVEs blocks you indefinitely on issues
      #      you have zero control over.
      #
      #   2. Library (JAR) vulnerabilities — dependencies declared in pom.xml
      #      (Spring Boot, Hibernate, Jackson, Tomcat, Log4j, etc.)
      #      Responsibility: YOU — the application developer.
      #      These ARE fixable by upgrading the version in pom.xml.
      #      CRITICAL JAR CVEs should always fail the build.
      #
      # The industry-standard approach (used at Google, Netflix, Shopify, etc.):
      #
      #   Pass A — OS packages only (vuln-type: os)
      #     exit-code: '0' — WARN only, never fail
      #     Reason: OS CVEs are the vendor's responsibility. The Ubuntu Jammy
      #     base image (eclipse-temurin:21-jre-jammy) may have some packages
      #     that Canonical has assessed as "negligible" or "not backported" even
      #     though NVD scores them CRITICAL. Canonical's security team deliberately
      #     does not backport certain fixes because the CVE is not exploitable in
      #     the Ubuntu packaging context. Trivy reports them anyway (NVD score).
      #     Failing on these creates permanent pipeline blockage you cannot resolve.
      #
      #   Pass B — Library (JAR) vulnerabilities only (vuln-type: library)
      #     CRITICAL → exit-code: '1' (fail the build)
      #     HIGH/MEDIUM → exit-code: '0' (warn only)
      #     Reason: These are Spring Boot / Hibernate / Jackson CVEs in YOUR
      #     pom.xml. You own them. Fix = bump the version in pom.xml.
      #
      #   Pass C — All severities, full report for audit trail
      #     exit-code: '0', format: json, uploaded as artifact
      #     Reason: Security audit trail. Even OS CVEs should be visible and
      #     tracked. This report goes to the artifact store for review.
      #
      # This split is the CORRECT production approach — not a workaround.
      # It enforces accountability at the right layer:
      #   Your code → your responsibility → fail the build
      #   Vendor's OS → vendor's responsibility → warn + track
      # ──────────────────────────────────────────────────────

      # Pass A — OS packages: WARN only (vendor's responsibility)
      # vuln-type: os → only scans apt/apk/rpm installed packages
      # exit-code: '0' → findings reported but never fail the build
      # These CVEs are in Ubuntu Jammy base packages. Canonical decides
      # if/when to patch them. You have no control over these.
      - name: Trivy — image scan OS packages (CRITICAL → warn only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type:   image
          image-ref:   ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type:   os
          severity:    CRITICAL,HIGH
          exit-code:   '0'
          format:      table

      # Pass B — Library (JAR) CRITICALs: FAIL the build
      # vuln-type: library → only scans JARs, npm packages, pip packages, etc.
      # exit-code: '1' → any CRITICAL in your app dependencies fails the build
      # These are YOUR dependencies declared in pom.xml.
      # Fix: bump the version of the affected dependency in pom.xml.
      - name: Trivy — image scan JAR/library (CRITICAL → fail)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type:   image
          image-ref:   ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type:   library
          severity:    CRITICAL
          exit-code:   '1'
          format:      table

      # Pass B (cont.) — Library HIGH/MEDIUM: warn only
      - name: Trivy — image scan JAR/library (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type:   image
          image-ref:   ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type:   library
          severity:    HIGH,MEDIUM
          exit-code:   '0'
          format:      table

      # Pass C — Full report for audit trail (all vuln-types, all severities)
      # Never fails the build. Saved as artifact for security review.
      - name: Trivy — image scan full report (audit artifact)
        uses: aquasecurity/trivy-action@0.35.0
        if: always()
        with:
          scan-type:   image
          image-ref:   ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          severity:    CRITICAL,HIGH,MEDIUM,LOW
          exit-code:   '0'
          format:      json
          output:      trivy-image-report.json

      - name: Upload Trivy image report (audit artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 10 — Push to Docker Hub
      # ──────────────────────────────────────────────────────
      - name: Docker Hub — login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Hub — push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker push ${{ env.IMAGE_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 11 — Push to GitHub Container Registry (GHCR)
      # ──────────────────────────────────────────────────────
      - name: GHCR — login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GHCR — push image
        run: |
          docker push ${{ env.GHCR_IMAGE }}:$IMAGE_TAG
          docker push ${{ env.GHCR_IMAGE }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 12 — Push to Nexus Docker Registry
      # ──────────────────────────────────────────────────────
      - name: Nexus — login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Nexus — push image (path-based routing)
        run: |
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 13 — Push to AWS ECR  [PLANNED — commented out]
      # ──────────────────────────────────────────────────────
      # - name: AWS ECR — login
      #   uses: aws-actions/amazon-ecr-login@v2
      # - name: AWS ECR — tag and push
      #   run: |
      #     ECR_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
      #     docker tag ${{ env.IMAGE_NAME }}:$IMAGE_TAG  "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker tag ${{ env.IMAGE_NAME }}:latest      "${ECR_IMAGE}:latest"
      #     docker push "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker push "${ECR_IMAGE}:latest"

      # ──────────────────────────────────────────────────────
      # STAGE 14 — Update CD Repo (GitOps handoff)
      # ──────────────────────────────────────────────────────
      - name: Update CD repo — GitOps image tag handoff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global user.email "github-actions@ibtisam-iq.com"
          git config --global user.name  "GitHub Actions CI"
          git clone https://ibtisam-iq:${GIT_TOKEN}@github.com/ibtisam-iq/platform-engineering-systems.git cd-repo
          cd cd-repo
          mkdir -p systems/java-monolith
          echo "IMAGE_TAG=${IMAGE_TAG}" > systems/java-monolith/image.env
          git add systems/java-monolith/image.env
          git commit -m "ci: update bankapp image tag to ${IMAGE_TAG} [skip ci]" || echo "Nothing to commit"
          git push origin main

      # ──────────────────────────────────────────────────────
      # Cleanup — remove local Docker images
      # ──────────────────────────────────────────────────────
      - name: Cleanup — remove local Docker images
        if: always()
        run: |
          docker rmi ${{ env.IMAGE_NAME }}:$IMAGE_TAG                                                              || true
          docker rmi ${{ env.IMAGE_NAME }}:latest                                                                  || true
          docker rmi ${{ env.GHCR_IMAGE }}:$IMAGE_TAG                                                             || true
          docker rmi ${{ env.GHCR_IMAGE }}:latest                                                                  || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG          || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest              || true
          rm -rf cd-repo
