# =============================================================
# DevSecOps CI Pipeline — Java Monolith (BankApp)
# Tool: GitHub Actions
# Stack: Maven 3.9 · Java 21 · SonarQube · Trivy · Nexus · Docker Hub · GHCR
# Reference copy: github.com/ibtisam-iq/devsecops-pipelines
#                 pipelines/java-monolith/github-actions/ci.yml
# Mirrors:        pipelines/java-monolith/jenkins/Jenkinsfile (14 stages)
# =============================================================
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   DOCKER_USERNAME       — Docker Hub username
#   DOCKER_PASSWORD       — Docker Hub PAT (read/write/delete)
#   NEXUS_USERNAME        — Nexus admin username
#   NEXUS_PASSWORD        — Nexus admin password
#   SONAR_TOKEN           — SonarQube user token
#   SONAR_HOST_URL        — https://sonar.ibtisam-iq.com
#   GIT_TOKEN             — GitHub PAT with repo scope (for CD repo update)
#   MAVEN_SETTINGS_XML    — Full contents of your settings.xml (Nexus credentials embedded)
#
# NOTE: GITHUB_TOKEN is automatically provided by GitHub Actions — no secret needed for GHCR login.
# =============================================================

name: DevSecOps CI — Java Monolith

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Jenkinsfile'
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Jenkinsfile'
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.env.example'
      - '.gitignore'
      - 'compose.yml'
  workflow_dispatch:

# Minimal top-level permissions — every job declares only what it needs
permissions:
  contents: read

# Cancel in-progress runs for the same branch (mirrors disableConcurrentBuilds)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── App metadata
  # APP_VERSION is intentionally NOT set here — it is extracted dynamically
  # from pom.xml in the versioning step to avoid manual drift.
  APP_NAME: java-monolith

  # ── Docker Hub
  IMAGE_NAME: mibtisam/java-monolith

  # ── GHCR
  GHCR_IMAGE: ghcr.io/ibtisam-iq/java-monolith

  # ── Nexus Docker (path-based routing — no dedicated port needed)
  NEXUS_DOCKER:      nexus.ibtisam-iq.com
  NEXUS_DOCKER_REPO: docker-hosted

  # ── App lives at repo root (no submodule path needed)
  APP_DIR: .

  # ── Java / Maven
  JAVA_VERSION: '21'
  # CI-only JVM flags: -XX:TieredStopAtLevel=1 disables the C2 JIT compiler,
  # trading peak runtime performance for faster startup/compilation in CI.
  # Do NOT use these flags in production JVM configuration.
  MAVEN_OPTS: >-
    -Xmx1g
    -XX:+TieredCompilation
    -XX:TieredStopAtLevel=1

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB — CI: Build, Test, Scan & Push (14 stages)
  # ════════════════════════════════════════════════════════════
  ci:
    name: CI — Build, Test & Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents:      read        # checkout
      packages:      write       # push to GHCR
      pull-requests: write       # SonarQube PR decoration
      checks:        write       # test reporter

    outputs:
      image_tag: ${{ steps.versioning.outputs.image_tag }}

    steps:

      # ──────────────────────────────────────────────────────
      # STAGE 1 — Checkout
      # fetch-depth: 0 required for SonarQube blame info.
      # Mirrors Jenkins: checkout([$class:'GitSCM'])
      # ──────────────────────────────────────────────────────
      - name: Checkout — source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────
      # STAGE 2 — Trivy Filesystem Scan
      # Runs BEFORE build — scan source + pom.xml for secrets,
      # misconfigs, and known CVEs in declared dependencies.
      # Two passes: CRITICAL (warn only) + HIGH/MEDIUM (warn only).
      # exit-code: '0' on both passes — filesystem scan is advisory;
      # the hard security gate is on the built image (Stage 9, Pass B).
      # See docs/trivy-troubleshooting.md for full rationale.
      # ──────────────────────────────────────────────────────
      - name: Trivy — filesystem scan (CRITICAL → warn only)
        # FIX #4: pinned to commit SHA of v0.35.0 — prevents supply-chain
        # tag-mutation attacks where a semver tag is force-pushed to a
        # malicious commit. SHA is immutable; tag is not.
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        with:
          scan-type: fs
          scan-ref:  ${{ env.APP_DIR }}
          scanners:  secret,vuln,misconfig
          severity:  CRITICAL
          exit-code: '0'
          format:    json
          output:    trivy-fs-report.json

      - name: Trivy — filesystem scan (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref:  ${{ env.APP_DIR }}
          scanners:  secret,vuln,misconfig
          severity:  HIGH,MEDIUM
          exit-code: '0'
          format:    table

      - name: Upload Trivy FS report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # Set up Java 21 + Maven dependency cache
      #
      # FIX #2: Moved BEFORE the Versioning step.
      # The versioning step runs `mvn help:evaluate` to read the pom.xml
      # version at runtime. That command must execute under the guaranteed
      # temurin-21 JDK installed here — not the runner's default JDK, which
      # may differ across ubuntu-24.04 image refreshes. Placing setup-java
      # after versioning was a silent ordering bug: it worked only because
      # ubuntu-24.04 happened to ship OpenJDK 21, but temurin is not
      # pre-installed and JAVA_HOME is not guaranteed to point to Java 21.
      # ──────────────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ──────────────────────────────────────────────────────
      # STAGE 3 — Versioning
      # APP_VERSION is read from pom.xml at runtime so the image tag
      # always matches the artifact version without manual sync.
      # Format: <pom-version>-<short-sha>-<run-number>
      # e.g.   0.0.1-SNAPSHOT-ab3f12c-42
      #
      # TWO outputs written deliberately:
      #   $GITHUB_OUTPUT  → steps.versioning.outputs.image_tag
      #                     Safe for ${{ }} expressions in later steps.
      #   $GITHUB_ENV     → IMAGE_TAG bash variable
      #                     Available to run: shell blocks from the NEXT step onward.
      #
      # NEVER use ${{ env.IMAGE_TAG }} for runtime-computed values —
      # the workflow-level env: block is parsed BEFORE any step runs,
      # so IMAGE_TAG would always resolve to empty string there.
      # ──────────────────────────────────────────────────────
      - name: Versioning — compute image tag
        id: versioning
        run: |
          APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${APP_VERSION}-${SHORT_SHA}-${{ github.run_number }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "🏷️  Image tag: ${IMAGE_TAG}"

      # ──────────────────────────────────────────────────────
      # Configure Maven settings (Nexus credentials)
      # env: block + printf '%s' pattern — safe injection of XML secrets.
      # See detailed explanation in git history / previous commits.
      # ──────────────────────────────────────────────────────
      - name: Configure Maven settings (Nexus credentials)
        env:
          MAVEN_SETTINGS: ${{ secrets.MAVEN_SETTINGS_XML }}
        run: |
          mkdir -p ~/.m2
          printf '%s' "$MAVEN_SETTINGS" > ~/.m2/settings.xml

      # ──────────────────────────────────────────────────────
      # STAGE 4 — Build & Test
      # mvn clean verify: compile → test → JaCoCo → package
      # ──────────────────────────────────────────────────────
      - name: Build & Test — mvn clean verify
        run: mvn clean verify -B --no-transfer-progress

      - name: Publish JUnit test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths:    'target/surefire-reports/*.xml'
          check_name:      JUnit Test Results
          fail_on_failure: false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 5 — SonarQube Analysis
      # -Dsonar.working.directory pins report-task.txt to workspace root
      # so the Quality Gate action (Stage 6) can always find it.
      # ──────────────────────────────────────────────────────
      - name: SonarQube — static analysis
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=IbtisamIQbankapp \
            -Dsonar.projectName=IbtisamIQbankapp \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.working.directory="${GITHUB_WORKSPACE}/.scannerwork" \
            -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 6 — Quality Gate
      # scanMetadataReportFile must match -Dsonar.working.directory above.
      # Both this step and Stage 5 run in the same job on the same runner,
      # so ${GITHUB_WORKSPACE} (shell) and ${{ github.workspace }} (expression)
      # resolve to the same absolute path — no cross-job mismatch risk.
      # ──────────────────────────────────────────────────────
      - name: SonarQube — Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ github.workspace }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ──────────────────────────────────────────────────────
      # STAGE 7 — Publish JAR to Nexus
      # ──────────────────────────────────────────────────────
      - name: Publish JAR to Nexus
        run: mvn deploy -DskipTests -B --no-transfer-progress

      # ──────────────────────────────────────────────────────
      # STAGE 8 — Registry Logins (BEFORE build)
      # All three registry logins happen here so that the image
      # tag resolution and daemon availability are guaranteed
      # before docker build runs in the next step.
      # ──────────────────────────────────────────────────────
      - name: Docker Hub — login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: GHCR — login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nexus — login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.NEXUS_DOCKER }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      # ──────────────────────────────────────────────────────
      # STAGE 9 — Docker Build
      # load: true  → image loaded into local daemon for Trivy scan (Stage 10)
      # push: false → push happens AFTER Trivy passes (Stages 11-13)
      #
      # FIX #6 — CONSTRAINT: load: true is INCOMPATIBLE with multi-platform
      # builds. If you ever add `platforms: linux/amd64,linux/arm64`, Docker
      # Buildx cannot load a multi-platform manifest into the local daemon and
      # will error out. To enable multi-arch, you must either:
      #   (a) build → push directly (remove load: true, set push: true), or
      #   (b) build amd64 only for the scan, then rebuild multi-arch for push.
      # Current setup: single-platform amd64 only — load: true works correctly.
      # ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build — build image (load into daemon for scan + push)
        uses: docker/build-push-action@v6
        with:
          context:  ${{ env.APP_DIR }}
          push:     false
          load:     true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:${{ steps.versioning.outputs.image_tag }}
            ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest
          build-args: |
            SERVER_PORT=8000
          labels: |
            org.opencontainers.image.version=${{ steps.versioning.outputs.image_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ──────────────────────────────────────────────────────
      # STAGE 10 — Trivy Image Scan
      # Three passes — full rationale in docs/trivy-troubleshooting.md.
      # Summary:
      #   Pass A — OS packages (vendor's responsibility) → warn only
      #   Pass B — Library/JAR CVEs (your pom.xml)      → CRITICAL fails build
      #   Pass C — Full report (all types + severities)  → audit artifact only
      # ──────────────────────────────────────────────────────

      # Pass A — OS packages: warn only (Canonical/vendor's responsibility)
      - name: Trivy — image scan OS packages (CRITICAL → warn only)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: os
          severity:  CRITICAL,HIGH
          exit-code: '0'
          format:    table

      # Pass B — Library (JAR) CRITICALs: FAIL the build
      # These are YOUR dependencies in pom.xml. Fix = bump version.
      - name: Trivy — image scan JAR/library (CRITICAL → fail)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: library
          severity:  CRITICAL
          exit-code: '1'
          format:    table

      # Pass B (cont.) — Library HIGH/MEDIUM: warn only
      - name: Trivy — image scan JAR/library (HIGH/MEDIUM → warn only)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          vuln-type: library
          severity:  HIGH,MEDIUM
          exit-code: '0'
          format:    table

      # Pass C — Full report for audit trail (all vuln-types, all severities)
      - name: Trivy — image scan full report (audit artifact)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb5 # v0.35.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.versioning.outputs.image_tag }}
          severity:  CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'
          format:    json
          output:    trivy-image-report.json

      - name: Upload Trivy image report (audit artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 14

      # ──────────────────────────────────────────────────────
      # STAGE 11 — Push to Docker Hub
      #
      # FIX #1 — WHY bare $IMAGE_TAG and NOT ${{ env.IMAGE_TAG }}:
      # IMAGE_TAG is a runtime-computed value written to $GITHUB_ENV by the
      # versioning step. The ${{ env.IMAGE_TAG }} expression context is parsed
      # BEFORE any step runs — it would always resolve to empty string here.
      # Bare $IMAGE_TAG reads from the bash environment (populated from
      # $GITHUB_ENV at step start) and correctly gets the versioning output.
      # Static env vars like IMAGE_NAME (set in the top-level env: block) are
      # safe to use with ${{ env.* }} because they are known at parse time.
      # ──────────────────────────────────────────────────────
      - name: Docker Hub — push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker push ${{ env.IMAGE_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 12 — Push to GitHub Container Registry (GHCR)
      # (Same $IMAGE_TAG rationale as Stage 11 — see comment above.)
      # ──────────────────────────────────────────────────────
      - name: GHCR — push image
        run: |
          docker push ${{ env.GHCR_IMAGE }}:$IMAGE_TAG
          docker push ${{ env.GHCR_IMAGE }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 13 — Push to Nexus Docker Registry
      # (Same $IMAGE_TAG rationale as Stage 11 — see comment above.)
      # ──────────────────────────────────────────────────────
      - name: Nexus — push image (path-based routing)
        run: |
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG
          docker push ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest

      # ──────────────────────────────────────────────────────
      # STAGE 13b — Push to AWS ECR  [PLANNED — commented out]
      # ──────────────────────────────────────────────────────
      # - name: AWS ECR — login
      #   uses: aws-actions/amazon-ecr-login@v2
      # - name: AWS ECR — tag and push
      #   run: |
      #     ECR_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
      #     docker tag ${{ env.IMAGE_NAME }}:$IMAGE_TAG  "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker tag ${{ env.IMAGE_NAME }}:latest      "${ECR_IMAGE}:latest"
      #     docker push "${ECR_IMAGE}:${IMAGE_TAG}"
      #     docker push "${ECR_IMAGE}:latest"

      # ──────────────────────────────────────────────────────
      # STAGE 14 — Update CD Repo (GitOps handoff)
      # Runs only on push to main AND only if all prior steps succeeded
      # (success() is the implicit default when no status function is given).
      # This is intentional: the CD repo must only be updated when the full
      # pipeline passes — not on PR builds or partial failures.
      #
      # FIX #7 — Clone URL uses x-access-token pattern instead of hardcoded
      # username. The previous form `ibtisam-iq:${GIT_TOKEN}` bound the clone
      # to a specific account — if the PAT belongs to a different user, the
      # repo is transferred to an org, or the username changes, the clone
      # fails with 403. The x-access-token pattern is the standard GitHub
      # HTTPS PAT auth form: username is literally "x-access-token" and the
      # PAT is the password. It works for any PAT regardless of which account
      # issued it, and is the pattern recommended in GitHub's own docs.
      # ──────────────────────────────────────────────────────
      - name: Update CD repo — GitOps image tag handoff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global user.email "github-actions@ibtisam-iq.com"
          git config --global user.name  "GitHub Actions CI"
          git clone https://x-access-token:${GIT_TOKEN}@github.com/ibtisam-iq/platform-engineering-systems.git cd-repo
          cd cd-repo
          mkdir -p systems/java-monolith
          echo "IMAGE_TAG=${IMAGE_TAG}" > systems/java-monolith/image.env
          git add systems/java-monolith/image.env
          git commit -m "ci: update java-monolith image tag to ${IMAGE_TAG} [skip ci]" || echo "Nothing to commit"
          git push origin main

      # ──────────────────────────────────────────────────────
      # Cleanup — remove local Docker images
      # (Same $IMAGE_TAG rationale as Stage 11 — see comment above.)
      # ──────────────────────────────────────────────────────
      - name: Cleanup — remove local Docker images
        if: always()
        run: |
          docker rmi ${{ env.IMAGE_NAME }}:$IMAGE_TAG                                                             || true
          docker rmi ${{ env.IMAGE_NAME }}:latest                                                                 || true
          docker rmi ${{ env.GHCR_IMAGE }}:$IMAGE_TAG                                                            || true
          docker rmi ${{ env.GHCR_IMAGE }}:latest                                                                 || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:$IMAGE_TAG         || true
          docker rmi ${{ env.NEXUS_DOCKER }}/${{ env.NEXUS_DOCKER_REPO }}/${{ env.APP_NAME }}:latest             || true

      # ──────────────────────────────────────────────────────
      # Cleanup — remove cloned CD repo (if Stage 14 ran)
      # Separated from image cleanup — these are different concerns.
      # ──────────────────────────────────────────────────────
      - name: Cleanup — remove cloned CD repo workspace
        if: always()
        run: rm -rf cd-repo
